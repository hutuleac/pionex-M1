    close:    (c) => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2.2" strokeLinecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>,
    sun:      (c) => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>,
    moon:     (c) => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>,
    plus:     (c) => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2.4" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>,
    check:    (c) => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6L9 17l-5-5"/></svg>,
  };

  function AssetGlyph({ sym, theme, size = 32 }) {
    const colors = {
      BTC:  ['#F7931A', '#FFB84D'],
      ETH:  ['#627EEA', '#8FA2FF'],
      SOL:  ['#9945FF', '#14F195'],
      BNB:  ['#F3BA2F', '#FFD673'],
      XRP:  ['#00AAE4', '#4BD0FF'],
      DOGE: ['#C2A633', '#E8C947'],
      AVAX: ['#E84142', '#FF6A6A'],
      LINK: ['#2A5ADA', '#5A8EFF'],
      SUI:  ['#4DA2FF', '#A0D4FF'],
      TRX:  ['#FF0013', '#FF6070'],
      XLM:  ['#14B6E7', '#7FD9F5'],
      HYPE: ['#FF6B35', '#FFB347'],
    };
    const [a, b] = colors[sym] || [theme.accent, theme.accent];
    return (
      <div style={{
        width: size, height: size, borderRadius: size / 2,
        background: `linear-gradient(135deg, ${a}, ${b})`,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        color: '#fff', fontWeight: 700, fontSize: size * 0.38,
        fontFamily: TOKENS.font.display, letterSpacing: -0.4,
        boxShadow: `0 2px 10px ${a}33`,
        flexShrink: 0,
      }}>{sym.slice(0, 1)}</div>
    );
  }

  function KV({ theme, k, v, color }) {
    return (
      <div style={{ textAlign: 'center' }}>
        <div style={{ fontSize: 9, color: theme.text3, fontFamily: TOKENS.font.mono, letterSpacing: 0.5, textTransform: 'uppercase' }}>{k}</div>
        <div style={{ fontSize: 13, fontWeight: 700, color: color || theme.text, fontFamily: TOKENS.font.mono, fontVariantNumeric: 'tabular-nums' }}>{v}</div>
      </div>
    );
  }

  function GridRangeVis({ theme, grid }) {
    const lo = grid.rangeLow, hi = grid.rangeHigh;
    return (
      <div style={{ position: 'relative', height: 36, background: theme.surface2, borderRadius: 8, overflow: 'hidden', marginTop: 8 }}>
        <div style={{
          position: 'absolute', left: '8%', right: '8%', top: '25%', bottom: '25%',
          background: theme.accentSoft, borderRadius: 4, border: `1px solid ${theme.accent}44`,
        }} />
        <span style={{
          position: 'absolute', left: '8%', top: 4, fontSize: 9,
          color: theme.text3, fontFamily: TOKENS.font.mono,
        }}>${lo ? fmtPrice(lo) : '—'}</span>
        <span style={{
          position: 'absolute', right: '8%', top: 4, fontSize: 9,
          color: theme.text3, fontFamily: TOKENS.font.mono, textAlign: 'right',
        }}>${hi ? fmtPrice(hi) : '—'}</span>
        <div style={{
          position: 'absolute', left: '50%', top: '20%', bottom: '20%',
          width: 1, background: theme.accent + '66',
        }} />
      </div>
    );
  }

  function Card({ children, theme, style = {}, onClick, pad = 14 }) {
    return (
      <div onClick={onClick} style={{
        background: theme.surface, border: `1px solid ${theme.border}`,
        borderRadius: TOKENS.radius.lg, padding: pad,
        cursor: onClick ? 'pointer' : 'default',
        ...style,
      }}>{children}</div>
    );
  }

  </script>

  <!-- ═══════════════════════════════════════════════════════════════
       UI BLOCK 2 — DIRECTION B (direction-b.jsx)
  ════════════════════════════════════════════════════════════════ -->
  <script type="text/babel">

  function DirectionB({ theme, mode, setMode, accent, onSettings, onRefresh, lastUpdate, loading }) {
    const [seg, setSeg] = React.useState('signals');
    const [sort, setSort] = React.useState('score');
    const [filter, setFilter] = React.useState('all');
    const [expanded, setExpanded] = React.useState(null);
    const [scrolled, setScrolled] = React.useState(false);
    const d = window.CIM_DATA;
    if (!d) return null;

    const assets = React.useMemo(() => {
      let list = [...d.ASSETS];
      if (filter !== 'all') list = list.filter(a => a.bias === filter);
      if (sort === 'score') list.sort((a, b) => b.score - a.score);
      if (sort === 'change') list.sort((a, b) => b.change24h - a.change24h);
      return list;
    }, [sort, filter, d]);

    return (
      <div style={{
        width: '100%', height: '100%', background: theme.bg, color: theme.text,
        fontFamily: TOKENS.font.sans, display: 'flex', flexDirection: 'column',
        position: 'relative', overflow: 'hidden',
      }}>
        <TopB theme={theme} mode={mode} setMode={setMode} pulse={d.MARKET_PULSE}
              collapsed={scrolled} onSettings={onSettings} onRefresh={onRefresh}
              lastUpdate={lastUpdate} loading={loading} />
        <SegB theme={theme} seg={seg} setSeg={setSeg} accent={accent || theme.accent} />
        <div
          onScroll={e => setScrolled(e.target.scrollTop > 20)}
          style={{ flex: 1, overflowY: 'auto', overflowX: 'hidden', paddingBottom: 20 }}
        >
          {seg === 'signals' && (
            <SignalsB theme={theme} assets={assets} sort={sort} setSort={setSort}
                      filter={filter} setFilter={setFilter}
                      expanded={expanded} setExpanded={setExpanded} data={d} />
          )}
          {seg === 'grid'   && <GridB    theme={theme} data={d} expanded={expanded} setExpanded={setExpanded} />}
          {seg === 'regime' && <RegimeB  theme={theme} data={d} />}
        </div>
      </div>
    );
  }

  function TopB({ theme, mode, setMode, pulse, collapsed, onSettings, onRefresh, lastUpdate, loading }) {
    const fmtAgo = () => {
      if (!lastUpdate) return 'loading…';
      const s = Math.round((Date.now() - lastUpdate) / 1000);
      if (s < 60) return `${s}s ago`;
      return `${Math.round(s/60)}m ago`;
    };
    return (
      <div style={{
        background: theme.glass, backdropFilter: 'blur(14px)',
        borderBottom: `1px solid ${theme.border}`,
        padding: collapsed ? '12px 16px 8px' : '14px 16px 10px',
        transition: 'padding 0.2s',
      }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: collapsed ? 0 : 10 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <div style={{
              fontSize: 11, fontWeight: 800, letterSpacing: 2,
              padding: '3px 8px', borderRadius: 4,
              background: theme.accent, color: mode === 'dark' ? '#0A0B0E' : '#fff',
            }}>CIM</div>
            <div style={{ fontSize: 11, color: theme.text3, letterSpacing: 1, textTransform: 'uppercase' }}>v6.4 · 4H</div>
            {loading
              ? <div style={{ width: 6, height: 6, borderRadius: '50%', background: theme.warn, animation: 'cim-pulse 0.8s infinite' }} />
              : <Dot color={theme.bull} size={6} pulse />
            }
            <span style={{ fontSize: 10, color: theme.text3, fontFamily: TOKENS.font.mono }}>{fmtAgo()}</span>
          </div>
          <div style={{ display: 'flex', gap: 4 }}>
            <IconBtnB theme={theme} onClick={() => setMode(mode === 'dark' ? 'light' : 'dark')}>
              {mode === 'dark' ? Icon.sun(theme.text2) : Icon.moon(theme.text2)}
            </IconBtnB>
            <IconBtnB theme={theme} onClick={onRefresh}>{Icon.refresh(theme.text2)}</IconBtnB>
            <IconBtnB theme={theme} onClick={onSettings}>{Icon.settings(theme.text2)}</IconBtnB>
          </div>
        </div>
        {!collapsed && pulse && (
          <div style={{
            display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 1,
            background: theme.border, border: `1px solid ${theme.border}`, borderRadius: 8, overflow: 'hidden',
          }}>
            <PulseCellB theme={theme} label="F&G"
              value={pulse.fearGreed?.value ?? '—'}
              sub={pulse.fearGreed?.label ?? '—'}
              tone={pulse.fearGreed?.value >= 60 ? 'bull' : pulse.fearGreed?.value <= 40 ? 'bear' : 'warn'} />
            <PulseCellB theme={theme} label="SMART$"
              value={pulse.smartMoney?.ratio ? `${pulse.smartMoney.ratio.toFixed(2)}×` : '—'}
              sub={pulse.smartMoney?.bias?.toUpperCase() ?? '—'}
              tone={pulse.smartMoney?.bias === 'long' ? 'bull' : pulse.smartMoney?.bias === 'short' ? 'bear' : 'neutral'} />
            <PulseCellB theme={theme} label="VOL 24H"
              value={pulse.volume24h ? `${pulse.volume24h}B` : '—'}
              sub="USD" tone="neutral" />
            <PulseCellB theme={theme} label="BTC.D"
              value={pulse.btcDominance ?? '—'}
              sub="DOM" tone="neutral" />
          </div>
        )}
      </div>
    );
  }

  function IconBtnB({ theme, onClick, children }) {
    return (
      <button onClick={onClick} style={{
        width: 32, height: 32, borderRadius: 6, border: 'none',
        background: theme.surface2, cursor: 'pointer',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
      }}>{children}</button>
    );
  }

  function PulseCellB({ theme, label, value, sub, tone }) {
    const map = { bull: theme.bull, bear: theme.bear, warn: theme.warn, neutral: theme.text };
    return (
      <div style={{ background: theme.surface, padding: '6px 8px' }}>
        <div style={{ fontSize: 9, color: theme.text3, letterSpacing: 0.6, fontFamily: TOKENS.font.mono }}>{label}</div>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 4, marginTop: 2 }}>
          <span style={{
            fontSize: 13, fontWeight: 700, color: map[tone],
            fontFamily: TOKENS.font.mono, fontVariantNumeric: 'tabular-nums', lineHeight: 1,
          }}>{value}</span>
          <span style={{ fontSize: 9, color: theme.text3, fontFamily: TOKENS.font.mono }}>{sub}</span>
        </div>
      </div>
    );
  }

  function SegB({ theme, seg, setSeg, accent }) {
    const items = [['signals', 'Signals'], ['grid', 'Grid Bots'], ['regime', 'Regime']];
    return (
      <div style={{
        display: 'flex', padding: '10px 16px 6px',
        borderBottom: `1px solid ${theme.border}`, background: theme.bg, gap: 4,
      }}>
        <div style={{
          display: 'flex', flex: 1, padding: 3, borderRadius: 10,
          background: theme.surface2, border: `1px solid ${theme.border}`,
        }}>
          {items.map(([k, label]) => {
            const active = seg === k;
            return (
              <button key={k} onClick={() => setSeg(k)} style={{
                flex: 1, padding: '8px 10px', border: 'none', borderRadius: 7,
                background: active ? theme.surface : 'transparent',
                color: active ? theme.text : theme.text2,
                fontSize: 13, fontWeight: active ? 700 : 500, cursor: 'pointer',
                boxShadow: active ? `0 1px 2px rgba(0,0,0,0.1), inset 0 0 0 1px ${theme.border2}` : 'none',
                transition: 'all 0.15s',
              }}>{label}</button>
            );
          })}
        </div>
      </div>
    );
  }

  function SignalsB({ theme, assets, sort, setSort, filter, setFilter, expanded, setExpanded, data }) {
    return (
      <>
        <div style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '10px 16px 8px', overflowX: 'auto' }}>
          {[
            ['all', 'All', null],
            ['bullish', 'Bull', theme.bull],
            ['bearish', 'Bear', theme.bear],
            ['neutral', 'Neutral', null],
          ].map(([k, l, c]) => {
            const active = filter === k;
            return (
              <button key={k} onClick={() => setFilter(k)} style={{
                padding: '6px 12px', borderRadius: 999,
                border: `1px solid ${active ? (c || theme.text2) : theme.border}`,
                background: active ? (c ? c + '22' : theme.surface2) : 'transparent',
                color: active ? (c || theme.text) : theme.text2,
                fontSize: 12, fontWeight: 600, cursor: 'pointer', whiteSpace: 'nowrap',
              }}>{l}</button>
            );
          })}
          <div style={{ flex: 1 }} />
          <button onClick={() => setSort(sort === 'score' ? 'change' : 'score')} style={{
            display: 'flex', alignItems: 'center', gap: 4,
            padding: '6px 10px', borderRadius: 8, border: `1px solid ${theme.border}`,
            background: theme.surface2, color: theme.text2,
            fontSize: 11, fontWeight: 600, cursor: 'pointer', whiteSpace: 'nowrap',
            fontFamily: TOKENS.font.mono, textTransform: 'uppercase', letterSpacing: 0.5,
          }}>
            {Icon.filter(theme.text2)}
            {sort === 'score' ? 'Score' : '24h'}
          </button>
        </div>
        <div style={{
          display: 'grid', gridTemplateColumns: '1fr 60px 52px',
          padding: '6px 16px',
          fontSize: 10, color: theme.text3, letterSpacing: 0.6,
          textTransform: 'uppercase', fontFamily: TOKENS.font.mono,
          borderBottom: `1px solid ${theme.border}`,
        }}>
          <div>Asset · Setup</div>
          <div style={{ textAlign: 'right' }}>24h</div>
          <div style={{ textAlign: 'right' }}>Score</div>
        </div>
        <div>
          {assets.map(a => (
            <AssetRowB key={a.sym} theme={theme} a={a}
                       open={expanded === a.sym}
                       onClick={() => setExpanded(expanded === a.sym ? null : a.sym)} />
          ))}
          {assets.length === 0 && (
            <div style={{ padding: '40px 20px', textAlign: 'center', color: theme.text3, fontSize: 13 }}>
              No assets match this filter.
            </div>
          )}
        </div>
      </>
    );
  }

  function AssetRowB({ theme, a, open, onClick }) {
    const tone = a.bias === 'bullish' ? 'bull' : a.bias === 'bearish' ? 'bear' : 'neutral';
    const color = tone === 'bull' ? theme.bull : tone === 'bear' ? theme.bear : theme.text2;
    return (
      <>
        <div onClick={onClick} style={{
          display: 'grid', gridTemplateColumns: '1fr 60px 52px',
          alignItems: 'center', gap: 10, padding: '12px 16px',
          borderBottom: open ? 'none' : `1px solid ${theme.border}`,
          cursor: 'pointer', background: open ? theme.surface : 'transparent',
        }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, minWidth: 0 }}>
            <AssetGlyph sym={a.sym} theme={theme} size={30} />
            <div style={{ minWidth: 0 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                <span style={{ fontSize: 14, fontWeight: 700 }}>{a.sym}</span>
                <span style={{ fontSize: 10, color: theme.text3, fontFamily: TOKENS.font.mono, letterSpacing: 0.4 }}>
                  ${fmtPrice(a.price)}
                </span>
              </div>
              <div style={{ fontSize: 11, color: theme.text2, marginTop: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                {a.setup} · <span style={{ color: theme.text3 }}>{a.regime.replace(/_/g, ' ')}</span>
              </div>
            </div>
          </div>
          <div style={{ textAlign: 'right' }}>
            <Delta value={a.change24h} theme={theme} fs={12} />
            <Spark data={a.sparkline} theme={theme} color={color} width={56} height={16} fill={false} />
          </div>
          <div style={{ textAlign: 'right' }}>
            <div style={{
              fontSize: 18, fontWeight: 700, color, letterSpacing: -0.5,
              fontFamily: TOKENS.font.display, fontVariantNumeric: 'tabular-nums',
            }}>{a.score.toFixed(1)}</div>
            <Score value={a.score} theme={theme} size="sm" style={{ marginTop: 2 }} />
          </div>
        </div>
        {open && <ExpandedRow theme={theme} a={a} />}
      </>
    );
  }

  function ExpandedRow({ theme, a }) {
    return (
      <div style={{
        background: theme.surface, borderBottom: `1px solid ${theme.border}`,
        padding: '4px 16px 16px',
      }}>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 6, marginBottom: 10 }}>
          <Chip theme={theme} k="RSI" v={a.rsi} tone={a.rsi > 70 ? 'bear' : a.rsi < 30 ? 'bull' : 'neutral'} />
          <Chip theme={theme} k="Flow" v={`${a.flow >= 0 ? '+' : ''}${a.flow}%`} tone={a.flow > 5 ? 'bull' : a.flow < -5 ? 'bear' : 'neutral'} />
          <Chip theme={theme} k="OI" v={`${a.oi >= 0 ? '+' : ''}${a.oi.toFixed(1)}%`} tone={a.oi > 0 ? 'bull' : 'bear'} />
          <Chip theme={theme} k="CVD" v={a.cvd} tone={a.cvd === 'ACC' ? 'bull' : a.cvd === 'DIS' ? 'bear' : 'neutral'} />
          <Chip theme={theme} k="EMA" v={a.ema ? a.ema.split('/')[0] : '—'} tone={a.ema && a.ema.includes('BULL') ? 'bull' : a.ema && a.ema.includes('BEAR') ? 'bear' : 'neutral'} />
          <Chip theme={theme} k="STRUCT" v={a.structure ? a.structure.slice(0, 4) : '—'} tone={a.structure === 'Bullish' ? 'bull' : a.structure === 'Bearish' ? 'bear' : 'neutral'} />
          <Chip theme={theme} k="FVG" v={a.fvg?.near ? (a.fvg.confirmed ? '★' : '•') : '—'} tone={a.fvg?.side || 'neutral'} />
          <Chip theme={theme} k="ATR" v={a.atr?.toFixed(2) ?? '—'} tone="neutral" />
        </div>
        <div style={{ fontSize: 10, color: theme.text3, letterSpacing: 0.6, textTransform: 'uppercase', marginBottom: 6 }}>
          AVWAP position
        </div>
        <div style={{ display: 'flex', gap: 6, marginBottom: 12 }}>
          {['d5', 'd14', 'd30'].map(k => (
            <div key={k} style={{
              flex: 1, padding: '6px 0', textAlign: 'center', borderRadius: 6,
              background: a.avwap[k] === 'above' ? theme.bullSoft : theme.bearSoft,
              color: a.avwap[k] === 'above' ? theme.bull : theme.bear,
              fontSize: 11, fontWeight: 700, fontFamily: TOKENS.font.mono, letterSpacing: 0.5,
            }}>
              {k.toUpperCase()} {a.avwap[k] === 'above' ? '▲' : '▼'}
            </div>
          ))}
        </div>
        <div style={{ display: 'flex', gap: 6 }}>
          <a
            href={`https://www.tradingview.com/chart/?symbol=BINANCE:${a.sym}USDT.P&interval=240`}
            target="_blank" rel="noopener noreferrer"
            style={{
              flex: 1, padding: '10px', border: `1px solid ${theme.border2}`,
              background: theme.surface2, borderRadius: 8, color: theme.text,
              fontSize: 12, fontWeight: 600, cursor: 'pointer', textDecoration: 'none',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
            }}>View chart ↗</a>
          <div style={{
            flex: 1, padding: '10px', border: 'none', borderRadius: 8,
            background: a.gridFit === 'RECOMMENDED' ? theme.bull + '22' : theme.surface2,
            color: a.gridFit === 'RECOMMENDED' ? theme.bull : theme.text2,
            fontSize: 12, fontWeight: 700, textAlign: 'center',
            border: `1px solid ${a.gridFit === 'RECOMMENDED' ? theme.bull + '44' : theme.border}`,
          }}>Grid: {a.gridFit}</div>
        </div>
      </div>
    );
  }

  function Chip({ theme, k, v, tone }) {
    const map = {
      bull:    { bg: theme.bullSoft,    fg: theme.bull    },
      bear:    { bg: theme.bearSoft,    fg: theme.bear    },
      warn:    { bg: theme.warnSoft,    fg: theme.warn    },
      neutral: { bg: theme.surface2,   fg: theme.text2   },
    };
    const c = map[tone] || map.neutral;
    return (
      <div style={{
        padding: '6px 8px', background: c.bg, borderRadius: 6,
        display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 1,
      }}>
        <div style={{ fontSize: 8.5, color: theme.text3, letterSpacing: 0.5, fontFamily: TOKENS.font.mono }}>{k}</div>
        <div style={{ fontSize: 12, fontWeight: 700, color: c.fg, fontFamily: TOKENS.font.mono, fontVariantNumeric: 'tabular-nums' }}>{v}</div>
      </div>
    );
  }

  function GridB({ theme, data }) {
    const candidates = data.GRID_CANDIDATES || [];
    return (
      <div style={{ padding: '14px 16px 0' }}>
        <div style={{
          fontSize: 10, color: theme.text3, letterSpacing: 0.8, textTransform: 'uppercase',
          fontFamily: TOKENS.font.mono, marginBottom: 10,
        }}>Active candidates · read only</div>
        {candidates.map(g => (
          <div key={g.sym} style={{
            background: theme.surface, border: `1px solid ${theme.border}`,
            borderRadius: 12, padding: 14, marginBottom: 10,
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 10 }}>
              <AssetGlyph sym={g.sym} theme={theme} size={32} />
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 14, fontWeight: 700 }}>{g.sym}/USDT</div>
                <div style={{ fontSize: 10, color: theme.text3, fontFamily: TOKENS.font.mono, letterSpacing: 0.4 }}>
                  GRID · {g.mode.toUpperCase()} · {g.grids} LEVELS · {g.direction.toUpperCase()}
                </div>
              </div>
              <TagPill theme={theme} tone="bull" label={`${g.score.toFixed(1)}`} size="sm" mono />
            </div>
            <GridRangeVis theme={theme} grid={g} />
            <div style={{
              display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 10,
              marginTop: 12, paddingTop: 10, borderTop: `1px solid ${theme.border}`,
            }}>
              <KV theme={theme} k="Capital" v={`$${g.capital}`} />
              <KV theme={theme} k="Per grid" v={`+${g.netPerGridPct}%`} color={theme.bull} />
              <KV theme={theme} k="Est/day" v={`+${g.expectedDailyPct}%`} color={theme.bull} />
              <KV theme={theme} k="Score" v={g.score.toFixed(1)} color={theme.bull} />
            </div>
          </div>
        ))}
        {candidates.length === 0 && (
          <div style={{
            padding: '40px 20px', textAlign: 'center',
            background: theme.surface, border: `1px solid ${theme.border}`, borderRadius: 12,
            color: theme.text2, fontSize: 13,
          }}>
            No grid candidates right now. Market may be trending — wait for a ranging regime.
          </div>
        )}
      </div>
    );
  }

  function RegimeB({ theme, data }) {
    const r = data.REGIME;
    if (!r) return null;
    const tone = r.direction === 'bullish' ? 'bull' : r.direction === 'bearish' ? 'bear' : 'neutral';
    const color = tone === 'bull' ? theme.bull : tone === 'bear' ? theme.bear : theme.text2;
    const dist = data.ASSETS.reduce((m, a) => { m[a.regime] = (m[a.regime] || 0) + 1; return m; }, {});
    return (
      <div style={{ padding: '14px 16px 0' }}>
        <div style={{
          background: theme.surface, border: `1px solid ${theme.border}`,
          borderRadius: 14, padding: 16, marginBottom: 14,
          position: 'relative', overflow: 'hidden',
        }}>
          <div style={{
            position: 'absolute', inset: 0,
            background: `radial-gradient(500px 160px at 100% 0%, ${color}22, transparent 60%)`, pointerEvents: 'none',
          }} />
          <div style={{ position: 'relative' }}>
            <div style={{ fontSize: 10, color: theme.text3, letterSpacing: 0.8, fontFamily: TOKENS.font.mono, marginBottom: 6 }}>
              MARKET REGIME · 4H · BTC-LED
            </div>
            <div style={{ display: 'flex', alignItems: 'baseline', gap: 10, marginBottom: 4 }}>
              <span style={{ fontSize: 26, fontWeight: 700, color, fontFamily: TOKENS.font.display, letterSpacing: -0.6 }}>
                {r.label.replace(/_/g, ' ')}
              </span>
              <span style={{ fontSize: 12, color: theme.text3 }}>{r.since}</span>
            </div>
            <div style={{ fontSize: 13, color: theme.text2, marginBottom: 12, lineHeight: 1.4 }}>{r.headline}. {r.sub}</div>
            <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
              <span style={{ fontSize: 11, color: theme.text3 }}>Confidence</span>
              <div style={{ flex: 1, height: 6, borderRadius: 3, background: theme.surface3, overflow: 'hidden' }}>
                <div style={{ width: `${r.confidence}%`, height: '100%', background: color }} />
              </div>
              <span style={{ fontSize: 12, fontWeight: 700, color, fontFamily: TOKENS.font.mono }}>{r.confidence}%</span>
            </div>
          </div>
        </div>
        <div style={{
          fontSize: 10, color: theme.text3, letterSpacing: 0.8, textTransform: 'uppercase',
          fontFamily: TOKENS.font.mono, margin: '10px 0 8px',
        }}>Regime distribution · {data.ASSETS.length} assets</div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
          {Object.entries(dist).sort((a, b) => b[1] - a[1]).map(([reg, cnt]) => {
            const frac = cnt / data.ASSETS.length;
            const regColor = reg === 'TRENDING_UP' ? theme.bull
                           : reg === 'TRENDING_DOWN' ? theme.bear
                           : reg === 'SQUEEZE' ? theme.warn
                           : reg === 'EXPANSION' ? theme.accent
                           : theme.text2;
            return (
              <div key={reg} style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                <div style={{ width: 96, fontSize: 11, fontWeight: 600, color: regColor, fontFamily: TOKENS.font.mono, letterSpacing: 0.4 }}>
                  {reg.replace(/_/g, ' ')}
                </div>
                <div style={{ flex: 1, height: 16, background: theme.surface2, borderRadius: 4, overflow: 'hidden', border: `1px solid ${theme.border}` }}>
                  <div style={{
                    width: `${frac * 100}%`, height: '100%',
                    background: `linear-gradient(90deg, ${regColor}88, ${regColor})`,
                  }} />
                </div>
                <div style={{ width: 28, textAlign: 'right', fontSize: 11, fontWeight: 700, fontFamily: TOKENS.font.mono, color: theme.text }}>
                  {cnt}
                </div>
              </div>
            );
          })}
        </div>
        <div style={{ marginTop: 20, padding: 14, background: theme.surface, border: `1px solid ${theme.border}`, borderRadius: 12, marginBottom: 20 }}>
          <div style={{ fontSize: 10, color: theme.text3, letterSpacing: 0.8, fontFamily: TOKENS.font.mono, marginBottom: 8 }}>
            READING FOR THIS REGIME
          </div>
          {[
            r.direction === 'bullish' ? 'Grid bots: check RANGING assets only' : 'Grid bots: most viable in ranging market',
            r.direction === 'bullish' ? 'Trend setups: LONG bias on pullbacks' : r.direction === 'bearish' ? 'Trend setups: SHORT bias on bounces' : 'Trend setups: both directions valid',
            `${data.ASSETS.filter(a=>a.score>=7.5).length} of ${data.ASSETS.length} assets score ≥7.5`,
          ].map((t, i) => (
            <div key={i} style={{
              display: 'flex', gap: 8, padding: '6px 0', fontSize: 12, color: theme.text2,
              borderTop: i ? `1px solid ${theme.border}` : 'none',
            }}>
              <Dot color={theme.accent} size={5} />
              <span style={{ flex: 1, lineHeight: 1.45 }}>{t}</span>
            </div>
          ))}
        </div>
      </div>
    );
  }

  </script>

  <!-- ═══ PASS D: Data Adapter + App + ConfigPanel ═══════════════════════════ -->
  <script type="text/babel">

  // ── Adapter: per-ticker ───────────────────────────────────────────────────
  async function fetchTicker(sym) {
    const symbol = sym + 'USDT';
    const [pf, m] = await Promise.all([
      fetchPriceFunding(sym, symbol),
      getAdvancedMetrics(sym, symbol),
    ]);
    const price    = pf.price;
    const volume5d = m._df5d ? m._df5d.reduce((s, k) => s + k.Volume, 0) : 0;
    const sparkline = m._df5d ? m._df5d.slice(-17).map(k => k.Close) : [];

    const signals = interpretSignals(
      price, m.rsi, m.atr, m.flow, m.oiChange,
      m.poc5d, m.avwap5d, m.poc14d, m.avwap14d, m.avwap30d,
      m.cvd5d, m.cvd14d, m.cvd30d,
      m.structure4h, m.structure30d,
      m.sweep, m.fvgList,
      m.emaFast, m.emaSlow,
      m.volSpike, m.volCurr, m.volAvg
    );

    const { score, direction } = calcScore(
      price, m.atr, m.rsi, m.flow, m.oiChange,
      m.poc5d, m.avwap5d, m.poc14d, m.avwap14d, m.avwap30d,
      m.cvd5d, m.cvd14d, m.cvd30d,
      m.structure4h, m.structure30d,
      m.sweep, m.fvgList,
      m.emaFast, m.emaSlow,
      m.dc20Pos
    );

    const viability = assessGridViability(
      m.atrPct, m.adx?.adx ?? 20, m.rsi, m.bbBw, m.structure4h, m.dc20Pos
    );
    const profile   = getTickerGridProfile(sym);
    const gridRange = calcRangeFromATR(price, m.atrPct, profile.rangeMultiplier);
    const gridScore = calcGridScore({ ...m, funding: pf.funding, gridRange, volume5d });

    const nearFvg = m.fvgList && m.fvgList[0];
    const fvg = nearFvg ? {
      near:      Math.abs(price - nearFvg.mid) / price * 100 < 2.0,
      confirmed: nearFvg.type === 'BULL' ? m.structure4h !== 'Bearish' : m.structure4h !== 'Bullish',
      side:      nearFvg.type === 'BULL' ? 'bull' : 'bear',
    } : { near: false, confirmed: false, side: 'neutral' };

    const bias    = direction === 'LONG' ? 'bullish' : direction === 'SHORT' ? 'bearish' : 'neutral';
    const gridFit = viability.viable
      ? (gridScore.score >= 7.5 ? 'RECOMMENDED' : 'CAUTION')
      : 'AVOID';

    return {
      sym, name: sym, price,
      change24h:  m.change24h ?? 0,
      score, bias,
      setup:      signals['Setup']?.[0] ?? '—',
      regime:     m.regime,
      gridFit,
      rsi:        parseFloat((m.rsi    ?? 50).toFixed(1)),
      flow:       parseFloat((m.flow   ?? 0).toFixed(1)),
      oi:         parseFloat((m.oiChange ?? 0).toFixed(1)),
      cvd:        (m.cvd5d ?? 0) > 0 ? 'ACC' : (m.cvd5d ?? 0) < 0 ? 'DIS' : 'LAT',
      structure:  m.structure4h ?? '—',
      avwap: {
        d5:  price > (m.avwap5d  ?? price) ? 'above' : 'below',
        d14: price > (m.avwap14d ?? price) ? 'above' : 'below',
        d30: price > (m.avwap30d ?? price) ? 'above' : 'below',
      },
      poc: {
        d5:  m.poc5d  ?? price,
        d14: m.poc14d ?? price,
        confluence: m.poc14d ? Math.abs((m.poc5d - m.poc14d) / m.poc14d * 100) < 1.0 : false,
      },
      fvg,
      ema:        signals['EMA Trend']?.[0] ?? '—',
      atr:        m.atr ?? 0,
      sparkline,
      _gridScore: gridScore,
      _gridRange: gridRange,
      _viability: viability,
      _m: m,
      _pf: pf,
      _direction: direction,
    };
  }

  // ── Adapter: market pulse ─────────────────────────────────────────────────
  async function fetchPulseFull(tickers) {
    try {
      const pulse = await fetchMarketPulse(tickers.map(s => s + 'USDT'));
      return {
        fearGreed:    pulse.fg ?? { value: 50, label: 'Neutral' },
        smartMoney:   pulse.smartMoney ?? { ratio: 1.0, bias: 'neutral' },
        volume24h:    pulse.volume24h ? (pulse.volume24h / 1e9).toFixed(1) : '—',
        btcDominance: '—',
      };
    } catch (_) {
      return { fearGreed: { value: 50, label: 'Neutral' }, smartMoney: { ratio: 1.0, bias: 'neutral' }, volume24h: '—', btcDominance: '—' };
    }
  }

  // ── Compute regime ────────────────────────────────────────────────────────
  function computeRegime(assets) {
    if (!assets.length) return { label: 'MIXED', direction: 'neutral', since: '4H', headline: 'No data', sub: '', confidence: 0 };
    const dist = assets.reduce((m, a) => { m[a.regime] = (m[a.regime] || 0) + 1; return m; }, {});
    const [dominant] = Object.entries(dist).sort((a, b) => b[1] - a[1])[0] ?? ['MIXED', 0];
    const btc = assets.find(a => a.sym === 'BTC');
    const confidence = Math.round((dist[dominant] / assets.length) * 100);
    const direction  = dominant.includes('UP') || dominant.includes('BULL') ? 'bullish'
                     : dominant.includes('DOWN') || dominant.includes('BEAR') ? 'bearish' : 'neutral';
    return {
      label: dominant, direction, since: '4H',
      headline: `${dominant.replace(/_/g, ' ')} regime — ${assets.length} assets analyzed`,
      sub: btc ? `BTC score ${btc.score.toFixed(1)}, RSI ${btc.rsi}` : '',
      confidence,
    };
  }

  // ── Compute grid candidates ───────────────────────────────────────────────
  function computeGridCandidates(assets, capital) {
    return assets
      .filter(a => a._viability?.viable && (a._gridScore?.score ?? 0) >= 6)
      .sort((a, b) => b._gridScore.score - a._gridScore.score)
      .slice(0, 5)
      .map(a => {
        const range = a._gridRange ?? {};
        const hi    = range.rangeHigh ?? a.price * 1.05;
        const lo    = range.rangeLow  ?? a.price * 0.95;
        const { recommended: grids } = calcRecommendedGridCount(hi, lo);
        const isGeo = (range.rangeWidthPct ?? 0) >= GRID_CONFIG.GEOMETRIC_THRESHOLD_PCT;
        const { netPct } = calcGridProfitPerGrid(hi, lo, grids, GRID_CONFIG.FEE_PCT, isGeo);
        const { type: direction } = selectGridDirection(a._m?.structure4h ?? '—', a.score);
        const { mode } = selectGridMode(range.rangeWidthPct ?? 5);
        return {
          sym: a.sym, mode: mode.toLowerCase(), grids, capital,
          netPerGridPct:    (netPct * 100).toFixed(2),
          expectedDailyPct: (netPct * grids * 2 * 100).toFixed(2),
          score:     a._gridScore.score,
          rangeHigh: hi, rangeLow: lo, direction,
        };
      });
  }

  // ── Config Panel ──────────────────────────────────────────────────────────
  function ConfigPanel({ theme, capital, setCapital, interval, setInterval, tickers, setTickers, onClose }) {
    const [addInput, setAddInput] = React.useState('');
    const INTERVALS = [
      { label: '5m',  val: 300  },
      { label: '10m', val: 600  },
      { label: '20m', val: 1200 },
      { label: '30m', val: 1800 },
    ];

    function handleAddTicker() {
      const t = addInput.trim().toUpperCase();
      if (t && !tickers.includes(t)) {
        const next = [...tickers, t];
        setTickers(next);
        localStorage.setItem('cim_tickers', JSON.stringify(next));
      }
      setAddInput('');
    }

    function handleRemoveTicker(sym) {
      if (tickers.length <= 1) return;
      const next = tickers.filter(t => t !== sym);
      setTickers(next);
      localStorage.setItem('cim_tickers', JSON.stringify(next));
    }

    function handleCapital(v) {
      const n = parseFloat(v);
      if (!isNaN(n) && n > 0) { setCapital(n); setGridCapital(n); }
    }

    function handleInterval(val) {
      setInterval(val);
      localStorage.setItem('cim_interval', String(val));
    }

    return (
      <div style={{ position: 'fixed', inset: 0, zIndex: 100, display: 'flex', flexDirection: 'column', justifyContent: 'flex-end' }}>
        <div onClick={onClose} style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.55)' }} />
        <div style={{
          position: 'relative', zIndex: 1, background: theme.surface,
          borderRadius: '20px 20px 0 0', maxHeight: '80dvh', overflowY: 'auto',
          paddingBottom: 'env(safe-area-inset-bottom)',
        }}>
          <div style={{ display: 'flex', justifyContent: 'center', padding: '12px 0 4px' }}>
            <div style={{ width: 40, height: 4, borderRadius: 2, background: theme.border2 }} />
          </div>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '8px 20px 16px' }}>
            <div style={{ fontSize: 16, fontWeight: 700, color: theme.text, fontFamily: TOKENS.font.sans }}>Settings</div>
            <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 4 }}>
              <svg width={20} height={20} viewBox="0 0 24 24" fill="none" stroke={theme.text2} strokeWidth={2} strokeLinecap="round">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </div>

          <div style={{ padding: '0 20px 28px', display: 'flex', flexDirection: 'column', gap: 24 }}>
            {/* Refresh interval */}
            <div>
              <div style={{ fontSize: 11, color: theme.text3, letterSpacing: 0.8, fontFamily: TOKENS.font.mono, marginBottom: 10 }}>REFRESH INTERVAL</div>
              <div style={{ display: 'flex', gap: 8 }}>
                {INTERVALS.map(({ label, val }) => (
                  <button key={val} onClick={() => handleInterval(val)} style={{
                    flex: 1, padding: '9px 0', borderRadius: 8,
                    border: `1px solid ${interval === val ? theme.accent : theme.border}`,
                    background: interval === val ? theme.accentSoft : theme.surface2,
                    color: interval === val ? theme.accent : theme.text2,
                    fontSize: 13, fontWeight: 600, cursor: 'pointer', fontFamily: TOKENS.font.mono,
                  }}>{label}</button>
                ))}
              </div>
            </div>

            {/* Capital */}
            <div>
              <div style={{ fontSize: 11, color: theme.text3, letterSpacing: 0.8, fontFamily: TOKENS.font.mono, marginBottom: 10 }}>GRID CAPITAL (USD)</div>
              <input
                type="number"
                defaultValue={capital}
                onBlur={e => handleCapital(e.target.value)}
                style={{
                  width: '100%', padding: '10px 12px', borderRadius: 8,
                  border: `1px solid ${theme.border}`, background: theme.surface2,
                  color: theme.text, fontSize: 15, fontFamily: TOKENS.font.mono,
                  boxSizing: 'border-box',
                }}
              />
            </div>

            {/* Tickers */}
            <div>
              <div style={{ fontSize: 11, color: theme.text3, letterSpacing: 0.8, fontFamily: TOKENS.font.mono, marginBottom: 10 }}>ACTIVE TICKERS</div>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 12 }}>
                {tickers.map(sym => (
                  <div key={sym} style={{
                    display: 'flex', alignItems: 'center', gap: 6,
                    padding: '6px 10px', borderRadius: 20,
                    background: theme.surface2, border: `1px solid ${theme.border}`,
                  }}>
                    <span style={{ fontSize: 13, fontWeight: 600, color: theme.text, fontFamily: TOKENS.font.mono }}>{sym}</span>
                    {tickers.length > 1 && (
                      <button onClick={() => handleRemoveTicker(sym)} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 0, lineHeight: 1 }}>
                        <svg width={12} height={12} viewBox="0 0 24 24" fill="none" stroke={theme.text3} strokeWidth={2.5} strokeLinecap="round">
                          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                        </svg>
                      </button>
                    )}
                  </div>
                ))}
              </div>
              <div style={{ display: 'flex', gap: 8 }}>
                <input
                  value={addInput}
                  onChange={e => setAddInput(e.target.value.toUpperCase())}
                  onKeyDown={e => e.key === 'Enter' && handleAddTicker()}
                  placeholder="Add ticker…"
                  style={{
                    flex: 1, padding: '9px 12px', borderRadius: 8,
                    border: `1px solid ${theme.border}`, background: theme.surface2,
                    color: theme.text, fontSize: 13, fontFamily: TOKENS.font.mono,
                  }}
                />
                <button onClick={handleAddTicker} style={{
                  padding: '9px 16px', borderRadius: 8, background: theme.accent,
                  border: 'none', color: '#fff', fontSize: 13, fontWeight: 700, cursor: 'pointer',
                }}>+ Add</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ── App Root ──────────────────────────────────────────────────────────────
  function App() {
    const DEFAULT_TICKERS = ['BTC','BNB','SOL','SUI','TRX','DOGE','XLM','XRP','HYPE'];
    const [mode,       setMode]       = React.useState('dark');
    const [showConfig, setShowConfig] = React.useState(false);
    const [tickers,    setTickers]    = React.useState(() => {
      try { return JSON.parse(localStorage.getItem('cim_tickers')) || DEFAULT_TICKERS; }
      catch { return DEFAULT_TICKERS; }
    });
    const [capital,    setCapital]    = React.useState(() => getGridCapital());
    const [refreshInterval, setRefreshInterval] = React.useState(
      () => parseInt(localStorage.getItem('cim_interval') || '1200', 10)
    );
    const [loading,    setLoading]    = React.useState(true);
    const [error,      setError]      = React.useState(null);
    const [lastUpdate, setLastUpdate] = React.useState(null);
    const [dataVersion, setDataVersion] = React.useState(0);

    async function refresh() {
      setLoading(true);
      setError(null);
      try {
        const results = await Promise.allSettled([
          fetchPulseFull(tickers),
          ...tickers.map(s => fetchTicker(s)),
        ]);
        const pulseResult  = results[0];
        const tickerResults = results.slice(1);

        const mp = pulseResult.status === 'fulfilled'
          ? pulseResult.value
          : { fearGreed: { value: 50, label: 'Neutral' }, smartMoney: { ratio: 1.0, bias: 'neutral' }, volume24h: '—', btcDominance: '—' };

        const assets = tickerResults.filter(r => r.status === 'fulfilled').map(r => r.value);
        if (!assets.length) throw new Error('All ticker fetches failed — check network or API');

        const cap = getGridCapital();
        window.CIM_DATA = {
          MARKET_PULSE:       mp,
          REGIME:             computeRegime(assets),
          ASSETS:             assets,
          GRID_CANDIDATES:    computeGridCandidates(assets, cap),
          INDICATOR_GLOSSARY: [],
        };
        setLastUpdate(new Date());
        setDataVersion(v => v + 1);
        setError(null);
      } catch (e) {
        setError(e.message);
      } finally {
        setLoading(false);
      }
    }

    const tickerKey = tickers.join(',');
    React.useEffect(() => { refresh(); }, [tickerKey]);
    React.useEffect(() => {
      const id = window.setInterval(refresh, refreshInterval * 1000);
      return () => window.clearInterval(id);
    }, [refreshInterval, tickerKey]);

    const theme = useTheme(mode);
    const data  = window.CIM_DATA;

    return (
      <div style={{ width: '100%', height: '100%', position: 'relative' }}>
        {/* Initial loading overlay */}
        {loading && !data && (
          <div style={{
            position: 'absolute', inset: 0, zIndex: 50, background: theme.bg,
            display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 16,
          }}>
            <div style={{
              width: 32, height: 32, borderRadius: '50%',
              border: `3px solid ${theme.border2}`,
              borderTopColor: theme.accent,
              animation: 'cim-spin 0.8s linear infinite',
            }} />
            <div style={{ fontSize: 13, color: theme.text2, fontFamily: TOKENS.font.mono, letterSpacing: 0.5 }}>
              Fetching live data…
            </div>
          </div>
        )}

        {/* Error banner (when data present but refresh fails) */}
        {error && data && (
          <div style={{
            position: 'absolute', top: 0, left: 0, right: 0, zIndex: 40,
            background: '#FF3B30', padding: '8px 16px',
            fontSize: 12, color: '#fff', fontFamily: TOKENS.font.mono, textAlign: 'center',
          }}>{error}</div>
        )}

        {/* Main UI */}
        {data && (
          <DirectionB
            key={dataVersion}
            theme={theme}
            mode={mode}
            setMode={setMode}
            accent={theme.accent}
            onSettings={() => setShowConfig(true)}
            onRefresh={refresh}
            lastUpdate={lastUpdate}
            loading={loading}
          />
        )}

        {/* Config Panel */}
        {showConfig && (
          <ConfigPanel
            theme={theme}
            capital={capital}
            setCapital={setCapital}
            interval={refreshInterval}
            setInterval={setRefreshInterval}
            tickers={tickers}
            setTickers={setTickers}
            onClose={() => setShowConfig(false)}
          />
        )}
      </div>
    );
  }

  // ── Mount ─────────────────────────────────────────────────────────────────
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);

  </script>
